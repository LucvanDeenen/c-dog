name: Tagged Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Clean previous build output
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force dist, dist-electron, release -ErrorAction SilentlyContinue

      - name: Build app and Windows installer
        shell: pwsh
        run: |
          npx vue-tsc
          npx vite build
          npx electron-builder --win --publish never

      - name: Verify installer exists
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path release -Filter *.exe -File -ErrorAction SilentlyContinue
          if (-not $exe) {
            Write-Error "No .exe file found in release/."
          }

      - name: Create GitHub release and upload installer
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.exe
            release/*.blockmap
            release/*.yml
